name: Lint

on:
  pull_request:
    paths:
      - "README.md"
      - ".github/workflows/awesome-lint.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - ".github/workflows/awesome-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run awesome-lint
        run: npx --yes awesome-lint
